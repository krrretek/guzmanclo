<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadata about the document -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>

    <!-- SEO & Sharing Metadata -->
    <meta name="description" content="A brief description of my page for search engines.">
    <meta name="author" content="Your Name">

    <!-- REQUIRED: This script makes the 3D <model-viewer> tag work -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <!-- Link your CSS file here. Assuming your CSS is in a 'styles' folder or next to index.html -->
    <link rel="stylesheet" href="guzmanclo.css">

    <!-- Optional: Link external fonts (e.g., Google Fonts) -->
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"> -->
</head>
<body>

    <!-- Semantic structure starts here -->
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Reach out</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- The main content of your webpage goes here -->
        <section id="home">
            <h1>Welcome to my GitHub Page</h1>
            <p>This is where it begins.</p>
        </section>

        <section id="about">
            <h2>About</h2>
            <p>This is my work.</p>
        </section>

        <!-- Image input can go alongside your project descriptions here -->
        <section id="projects">
            <h2>My Projects</h2>
            <p>Showcase some of your work here.</p>
            <!-- Example of an image input -->
            <img src="firstproject.png" alt="A project image" style="max-width: 100%; height: auto;">
        </section>

        <!-- Moved the 3D model inside the main content area -->
        <section class="model-container">
            <h2>3D Artifact Study</h2>

            <!-- Added width and height so the model is visible -->
            <model-viewer
                src="gallerywall.glb"
                poster="path/to/poster-image.png"
                alt="A 3D model of a creative artifact"
                shadow-intensity="1"
                camera-controls
                auto-rotate
                ar
                style="width: 100%; height: 500px; background-color: #f4f4f4; border-radius: 8px;">
            </model-viewer>
        </section>

        <!-- Added the missing contact section so the navbar link works -->
        <section id="contact">
            <h2>Reach out</h2>
            <p>Feel free to contact me here.</p>
        </section>

    </main>

    <footer>
        <p>&copy; 2024 A Name. All rights reserved.</p>
    </footer>

    <!-- Link your JavaScript file here, at the end of the body so it loads after the HTML -->
    <!-- <script src="script.js"></script> -->
</body>
</html>
